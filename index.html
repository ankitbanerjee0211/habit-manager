<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Habit Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #000; --bg-card: #0a0c10; --green: #39ff14; --red: #ff3131; --yellow: #fff01f; }
        body { background-color: var(--bg-main); color: #e6edf3; font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 10px; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding: 10px 0; border-bottom: 1px solid #1f2328; }
        .app-container { width: 80vw; max-width: 1300px; margin: 0 auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; width: 100%; }
        .year-row { display: flex; gap: 10px; width: 100%; padding: 5px 15px; justify-content: space-between; overflow-x: auto; }
        .mini-month { background: #0a0c10; padding: 8px; border-radius: 8px; border: 1px solid #1f2328; flex: 1; min-width: 120px; }
        .day-box { border-radius: 2px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .year-box { width: 100%; aspect-ratio: 1/1; font-size: 7px; max-width: 18px; margin: 0 auto; }
        .month-box { width: 32px; height: 32px; font-size: 10px; }
        .c-empty { background: #161b22; color: #484f58; }
        .c-red { background: var(--red); color: #000; }
        .c-yellow { background: var(--yellow); color: #000; }
        .c-green { background: var(--green); color: #000; }
        .c-darkgreen { background: #008f11; color: #fff; }
        .selected-day { outline: 2px solid #fff; outline-offset: 1px; box-shadow: 0 0 8px #fff; }
        .input-ritual { border: 2px solid #0056b3; background: #000; outline: none; }
        .input-task { border: 2px solid #6a0dad; background: #000; outline: none; }
    </style>
</head>
<body class="p-2">
    <div class="app-container space-y-4">
        <div class="sticky-header text-center">
            <h1 class="text-xl md:text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 uppercase italic">Simple Habit Manager</h1>
            <div id="syncStatus" class="text-[9px] font-black text-green-400 mt-1 opacity-60">☁️ CHECKING CLOUD...</div>
            <div class="flex flex-col md:flex-row justify-between items-center gap-3 bg-[#0d1117] p-4 rounded-2xl border border-[#1f2328] mt-2">
                <div class="text-left">
                    <h2 id="currentDateDisplay" class="text-lg font-bold">...</h2>
                    <p class="text-yellow-400 font-black text-[10px] uppercase tracking-widest mt-1">🔥 <span id="streakCount">0</span> Day Streak</p>
                </div>
                <input type="date" id="globalDatePicker" onchange="render()" class="bg-black border border-[#30363d] p-1.5 rounded-xl text-xs font-black">
            </div>
        </div>

        <div class="bg-[#0d1117] p-4 rounded-2xl border border-[#1f2328]">
            <div class="flex justify-between items-center mb-3">
                <div class="flex gap-1 bg-black p-1 rounded-lg">
                    <button onclick="changeView('month')" id="btn-month" class="px-4 py-1 text-[10px] font-black rounded">MONTH</button>
                    <button onclick="changeView('year')" id="btn-year" class="px-4 py-1 text-[10px] font-black rounded">YEAR</button>
                </div>
                <h2 id="viewHeading" class="text-[10px] font-black uppercase text-gray-500"></h2>
            </div>
            <div id="viewContainer"></div>
        </div>

        <div class="grid lg:grid-cols-2 gap-4">
            <div class="bg-[#0d1117] rounded-2xl border border-[#1f2328] overflow-hidden">
                <div class="px-4 py-2 bg-[#161b22] text-[10px] font-black text-blue-400 uppercase tracking-widest">🔄 Rituals</div>
                <div class="p-3 space-y-3">
                    <div class="flex gap-2"><input id="repInput" type="text" class="input-ritual flex-1 p-2 rounded-xl text-xs" placeholder="Habit..."><button onclick="addTask('repetitive')" class="bg-blue-600 w-10 h-10 rounded-xl font-black">+</button></div>
                    <ul id="repList" class="divide-y divide-[#1f2328]"></ul>
                </div>
            </div>
            <div class="bg-[#0d1117] rounded-2xl border border-[#1f2328] overflow-hidden">
                <div class="px-4 py-2 bg-[#161b22] text-[10px] font-black text-purple-400 uppercase tracking-widest">🎯 Tasks</div>
                <div class="p-3 space-y-3">
                    <div class="flex gap-2"><input id="specInput" type="text" class="input-task flex-1 p-2 rounded-xl text-xs" placeholder="Task..."><button onclick="addTask('specific')" class="bg-purple-600 w-10 h-10 rounded-xl font-black">+</button></div>
                    <ul id="specList" class="divide-y divide-[#1f2328]"></ul>
                </div>
            </div>
        </div>
        <div class="text-center opacity-40 py-2 text-[10px] font-black uppercase">Ankit Banerjee Edition</div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR NEW DEPLOYMENT URL
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbyiiPA63xZDP8sGqWTlXZfw8QGusbuEfu-sdH_rh6R1pmVU9bfbyEOPR-wmk4e1U34OvA/exec"; 
        
        let data = { repetitive: [], specific: [], history: {}, currentView: 'month' };

        const getToday = () => new Date().toLocaleDateString('en-CA');

        async function sync(action) {
    if(!SHEET_URL || SHEET_URL.includes("PASTE")) return;
    const statusEl = document.getElementById('syncStatus');
    
    try {
        if(action === 'save') {
            statusEl.innerText = "☁️ SAVING...";
            // We use 'no-cors' to bypass the security block
            await fetch(SHEET_URL, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify(data)
            });
            statusEl.innerText = "☁️ SAVED TO DRIVE";
        } else {
            statusEl.innerText = "☁️ LOADING...";
            const res = await fetch(SHEET_URL);
            const cloudData = await res.json();
            if(cloudData && cloudData.history) {
                data = cloudData;
                statusEl.innerText = "☁️ CLOUD SYNCED";
                render(); // Refresh the UI with new data
            } else {
                statusEl.innerText = "☁️ NEW DATABASE";
            }
        }
    } catch(e) { 
        statusEl.innerText = "☁️ LOCAL MODE";
        console.log("Sync Note:", e);
    }
}

        window.onload = async () => {
            document.getElementById('globalDatePicker').value = getToday();
            await sync('load');
            render();
        };

        function changeView(v) { data.currentView = v; render(); }
        
        async function addTask(type) {
            const date = document.getElementById('globalDatePicker').value;
            const input = document.getElementById(type === 'repetitive' ? 'repInput' : 'specInput');
            if (!input.value.trim()) return;
            if (type === 'repetitive') data.repetitive.push({ text: input.value, createdAt: date, completions: [] });
            else data.specific.push({ text: input.value, completed: false, date: date });
            input.value = ''; render(); await sync('save');
        }

        async function toggleTask(type, id, date) {
            if (type === 'specific') {
                const item = data.specific.find(t => t.text === id && t.date === date);
                if(item) item.completed = !item.completed;
            } else {
                const item = data.repetitive[id];
                item.completions.includes(date) ? item.completions = item.completions.filter(d => d !== date) : item.completions.push(date);
            }
            render(); await sync('save');
            if (data.history[date] >= 100) confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
        }

        function render() {
            const selDate = document.getElementById('globalDatePicker').value;
            const dateObj = new Date(selDate);
            document.getElementById('currentDateDisplay').innerText = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
            document.getElementById('viewHeading').innerText = data.currentView === 'year' ? dateObj.getFullYear() : dateObj.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const isYear = data.currentView === 'year';
            document.getElementById('btn-month').className = `px-4 py-1 text-[10px] font-black rounded ${!isYear ? 'bg-green-400 text-black shadow-[0_0_8px_#39ff14]' : 'text-gray-500'}`;
            document.getElementById('btn-year').className = `px-4 py-1 text-[10px] font-black rounded ${isYear ? 'bg-green-400 text-black shadow-[0_0_8px_#39ff14]' : 'text-gray-500'}`;

            const rituals = data.repetitive.filter(r => r.createdAt <= selDate);
            const specs = data.specific.filter(t => t.date === selDate);
            const total = rituals.length + specs.length, done = rituals.filter(r => r.completions.includes(selDate)).length + specs.filter(t => t.completed).length;
            if(total > 0) data.history[selDate] = (done / total) * 100;

            const renderList = (id, list, type) => {
                document.getElementById(id).innerHTML = list.length ? list.map((t, i) => {
                    const idx = type === 'specific' ? data.specific.indexOf(t) : data.repetitive.indexOf(t);
                    const isDone = type === 'specific' ? t.completed : t.completions.includes(selDate);
                    return `<li class="flex items-center justify-between py-2"><div class="flex items-center gap-3"><input type="checkbox" class="w-4 h-4 accent-[#39ff14]" ${isDone ? 'checked' : ''} onclick="toggleTask('${type}', '${type==='specific'?t.text:idx}', '${selDate}')"><span class="${isDone ? 'line-through opacity-40' : 'text-white font-bold'} text-xs">${t.text}</span></div></li>`
                }).join('') : `<p class="py-4 text-center text-[10px] font-black opacity-30 uppercase">Empty</p>`;
            };
            renderList('repList', rituals, 'repetitive');
            renderList('specList', specs, 'specific');

            let streak = 0; let d_s = new Date();
            while(data.history[d_s.toLocaleDateString('en-CA')] >= 91) { streak++; d_s.setDate(d_s.getDate()-1); }
            document.getElementById('streakCount').innerText = streak;
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('viewContainer'); container.innerHTML = '';
            const today = getToday(), selDate = document.getElementById('globalDatePicker').value;
            const daysArr = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

            if (data.currentView === 'year') {
                const yearWrapper = document.createElement('div'); yearWrapper.className = 'year-wrapper';
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const year = new Date(selDate).getFullYear();
                const createRow = (start, end) => {
                    const row = document.createElement('div'); row.className = 'year-row hide-scrollbar';
                    for(let i=start; i<end; i++) {
                        const mWrap = document.createElement('div'); mWrap.className = 'mini-month';
                        mWrap.innerHTML = `<span class="text-[8px] font-black mb-1 block text-center text-[#39ff14] uppercase">${months[i]}</span><div class="grid grid-cols-7 gap-1 text-[5px] text-gray-600 text-center mb-1"><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div></div>`;
                        const grid = document.createElement('div'); grid.className = 'calendar-grid';
                        let first = new Date(year, i, 1); let startDay = first.getDay() || 7;
                        for(let e=1; e<startDay; e++) grid.innerHTML += `<div class="year-box"></div>`;
                        for(let d=1; d<=new Date(year, i+1, 0).getDate(); d++) grid.appendChild(createBox(new Date(year, i, d), 'year-box', today, selDate));
                        mWrap.appendChild(grid); row.appendChild(mWrap);
                    } return row;
                };
                yearWrapper.appendChild(createRow(0, 6)); yearWrapper.appendChild(createRow(6, 12));
                container.appendChild(yearWrapper);
            } else {
                const wrap = document.createElement('div'); wrap.className = 'max-w-[280px] mx-auto space-y-2';
                const head = document.createElement('div'); head.className = 'calendar-grid text-[9px] font-black text-gray-600 text-center mb-1';
                ['MON','TUE','WED','THU','FRI','SAT','SUN'].forEach(d => head.innerHTML += `<div>${d}</div>`);
                wrap.appendChild(head);
                const grid = document.createElement('div'); grid.className = 'calendar-grid';
                const sel = new Date(selDate), first = new Date(sel.getFullYear(), sel.getMonth(), 1);
                let startDay = first.getDay() || 7;
                for(let e=1; e<startDay; e++) grid.innerHTML += `<div class="month-box"></div>`;
                for(let d=1; d<=new Date(sel.getFullYear(), sel.getMonth()+1, 0).getDate(); d++) grid.appendChild(createBox(new Date(sel.getFullYear(), sel.getMonth(), d), 'month-box', today, selDate));
                wrap.appendChild(grid); container.appendChild(wrap);
            }
        }

        function createBox(date, sizeClass, today, selDate) {
            const dStr = date.toLocaleDateString('en-CA'), pct = data.history[dStr];
            let cls = 'c-empty';
            if (dStr <= today && pct !== undefined) {
                if (pct <= 40) cls = 'c-red'; else if (pct <= 60) cls = 'c-yellow'; else if (pct <= 90) cls = 'c-green'; else cls = 'c-darkgreen';
            }
            const div = document.createElement('div'); div.className = `day-box ${sizeClass} ${cls} ${dStr === selDate ? 'selected-day' : ''}`;
            div.innerText = date.getDate(); div.onclick = () => { document.getElementById('globalDatePicker').value = dStr; render(); };
            return div;
        }
    </script>
</body>
</html>
