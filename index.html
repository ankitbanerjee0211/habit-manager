<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Habit Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --green: #39ff14; --red: #ff3131; --yellow: #fff01f; --border: #30363d; --text-main: #ffffff; --text-muted: #cbd5e1; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* High Contrast Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: var(--green); }

        .app-container { width: 85vw; max-width: 1400px; margin: 0 auto; padding-bottom: 30px; }
        
        .sticky-header { 
            position: sticky; top: 0; z-index: 100; 
            backdrop-filter: blur(15px); 
            background: rgba(0,0,0,0.85); 
            padding: 15px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
        }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        
        .day-box { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; cursor: pointer; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        /* Brightened Colors */
        .c-empty { background: #21262d; color: #8b949e; }
        .c-red { background: var(--red); color: #000; box-shadow: 0 0 8px rgba(255,49,49,0.4); }
        .c-yellow { background: var(--yellow); color: #000; box-shadow: 0 0 8px rgba(255,240,31,0.4); }
        .c-green { background: var(--green); color: #000; box-shadow: 0 0 12px rgba(57,255,20,0.5); }
        
        .selected-day { 
            outline: 3px solid #fff; 
            outline-offset: 1px; 
            box-shadow: 0 0 25px rgba(255,255,255,0.6); 
        }
        
        /* Bright Labels */
        .weekday-label { font-size: 9px; font-weight: 900; color: #f8fafc; text-align: center; text-transform: uppercase; }
        .mini-month { background: #0d1117; padding: 12px; border-radius: 12px; border: 1px solid var(--border); flex: 1; }
        
        /* Habit List Styling */
        .habit-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
        .habit-text { font-weight: 700; color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        
        .delete-btn { color: #94a3b8; transition: color 0.2s; font-size: 14px; }
        .delete-btn:hover { color: #ff4444; }

        input:disabled, button:disabled { opacity: 0.3; cursor: not-allowed; }
        .future-lock { opacity: 0.4; pointer-events: none; }

        @media (max-width: 768px) {
            .year-row { display: flex; gap: 12px; width: 100%; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
            .mini-month { min-width: 160px; }
        }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="app-container space-y-6">
        <div class="sticky-header text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-white to-purple-400 uppercase italic tracking-tighter">Habit Manager</h1>
            <div id="syncStatus" class="text-[10px] font-black text-green-400 mt-1 uppercase tracking-widest brightness-125">☁️ Database Online</div>
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-3 bg-[#161b22] p-5 rounded-2xl border border-white/20 mt-4">
                <div class="text-left">
                    <h2 id="displayDate" class="text-2xl font-bold text-white leading-none">...</h2>
                    <p class="text-yellow-300 font-black text-[11px] uppercase mt-2 tracking-widest brightness-110">🔥 Streak: <span id="streakCount">0</span> Days</p>
                </div>
                <input type="date" id="datePicker" onchange="render()" class="bg-black border-2 border-gray-600 p-2.5 rounded-xl text-sm font-bold text-white outline-none focus:border-green-400 transition-all cursor-pointer">
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-6 text-[10px] font-black uppercase tracking-widest text-slate-100 bg-[#0d1117] p-3 rounded-xl border border-white/10 shadow-lg">
            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-sm c-empty border border-white/5"></div> 0%</div>
            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-sm c-red"></div> 1-40%</div>
            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-sm c-yellow"></div> 41-80%</div>
            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-sm c-green"></div> 81-100%</div>
        </div>

        <div class="bg-[#0d1117] p-5 rounded-2xl border border-white/10">
            <div class="flex justify-between items-center mb-6">
                <div class="flex bg-black p-1.5 rounded-xl border-2 border-gray-800">
                    <button onclick="setView('month')" id="btn-month" class="px-6 py-2 text-[11px] font-black rounded-lg transition-all">MONTH</button>
                    <button onclick="setView('year')" id="btn-year" class="px-6 py-2 text-[11px] font-black rounded-lg transition-all">YEAR</button>
                </div>
                <h2 id="viewLabel" class="text-[11px] font-black uppercase text-white tracking-[0.2em]"></h2>
            </div>
            <div id="gridContainer" class="w-full"></div>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">
            <div class="bg-[#0d1117] rounded-3xl border border-white/10 p-6">
                <p class="text-[11px] font-black text-blue-300 uppercase mb-4 tracking-widest brightness-125">🔄 Daily Rituals</p>
                <div class="flex gap-2 mb-5">
                    <input id="repIn" type="text" class="flex-1 bg-black border-2 border-blue-900/40 p-4 rounded-2xl text-sm text-white font-bold outline-none focus:border-blue-400 transition-all" placeholder="Enter habit...">
                    <button id="repBtn" onclick="addHabit('rep')" class="bg-blue-600 text-white px-6 rounded-2xl font-black text-lg hover:bg-blue-500">+</button>
                </div>
                <ul id="repList" class="space-y-3"></ul>
            </div>
            <div class="bg-[#0d1117] rounded-3xl border border-white/10 p-6">
                <p class="text-[11px] font-black text-purple-300 uppercase mb-4 tracking-widest brightness-125">🎯 Specific Tasks</p>
                <div class="flex gap-2 mb-5">
                    <input id="specIn" type="text" class="flex-1 bg-black border-2 border-purple-900/40 p-4 rounded-2xl text-sm text-white font-bold outline-none focus:border-purple-400 transition-all" placeholder="Enter task...">
                    <button id="specBtn" onclick="addHabit('spec')" class="bg-purple-600 text-white px-6 rounded-2xl font-black text-lg hover:bg-purple-500">+</button>
                </div>
                <ul id="specList" class="space-y-3"></ul>
            </div>
        </div>

        <div class="pt-10 flex flex-col items-center gap-6 border-t border-white/10">
            <button onclick="resetAllData()" class="px-8 py-3 bg-red-900/20 border-2 border-red-500 text-red-400 text-[11px] font-black uppercase rounded-xl hover:bg-red-500 hover:text-black transition-all">
                Reset All Data
            </button>
            <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em]">
                Ankit Banerjee <span class="text-green-400 italic">Edition</span>
            </p>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxJvcN0ZrrTVxFvqsTytAabThvdp_U24Vn-WAY7-fND4uWtFqaTxANQ86oaFpp0f4qBug/exec";
        let data = { habits: [], tasks: [], history: {}, view: 'month' };

        const toKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const getTodayKey = () => toKey(new Date());

        async function sync(type) {
            const status = document.getElementById('syncStatus');
            try {
                if(type === 'save') {
                    status.innerText = "☁️ SAVING...";
                    await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    setTimeout(() => status.innerText = "✅ DATABASE UPDATED", 800);
                } else {
                    status.innerText = "☁️ LOADING...";
                    const res = await fetch(SHEET_URL + "?t=" + Date.now());
                    const cloud = await res.json();
                    if(cloud && cloud.history) data = cloud;
                    status.innerText = "✅ DATABASE ONLINE";
                    render();
                }
            } catch(e) { status.innerText = "⚠️ OFFLINE MODE"; render(); }
        }

        function setView(v) { data.view = v; render(); }

        function addHabit(type) {
            const date = document.getElementById('datePicker').value;
            if (date < getTodayKey()) return alert("Error: Past date entry blocked.");
            const input = document.getElementById(type === 'rep' ? 'repIn' : 'specIn');
            if(!input.value.trim()) return;
            if(type === 'rep') data.habits.push({ text: input.value, start: date, done: [] });
            else data.tasks.push({ text: input.value, date: date, completed: false });
            input.value = ''; render(); sync('save');
        }

        function toggle(type, index) {
            const date = document.getElementById('datePicker').value;
            if (date > getTodayKey()) return alert("Error: Future date completion blocked.");
            if(type === 'rep') {
                const h = data.habits[index];
                h.done.includes(date) ? h.done = h.done.filter(d => d !== date) : h.done.push(date);
            } else {
                data.tasks[index].completed = !data.tasks[index].completed;
            }
            render(); sync('save');
            if(data.history[date] >= 100) confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
        }

        function removeTask(type, index) {
            if(confirm("Confirm Delete?")) {
                if(type === 'rep') data.habits.splice(index, 1);
                else data.tasks.splice(index, 1);
                render(); sync('save');
            }
        }

        function resetAllData() {
            if(confirm("DANGER: Wipe all database history?")) {
                data = { habits: [], tasks: [], history: {}, view: 'month' };
                render(); sync('save');
            }
        }

        function render() {
            const selStr = document.getElementById('datePicker').value;
            const todayStr = getTodayKey();
            const [y, m, d] = selStr.split('-').map(Number);
            const dateObj = new Date(y, m-1, d);
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

            document.getElementById('displayDate').innerText = `${days[dateObj.getDay()]}, ${monthNames[dateObj.getMonth()]} ${d}`;
            document.getElementById('viewLabel').innerText = data.view === 'year' ? y : `${monthNames[m-1]} ${y}`;

            const isPast = selStr < todayStr;
            document.getElementById('repIn').disabled = isPast;
            document.getElementById('specIn').disabled = isPast;
            document.getElementById('repBtn').disabled = isPast;
            document.getElementById('specBtn').disabled = isPast;

            document.getElementById('btn-month').className = `px-6 py-2 text-[11px] font-black rounded-lg transition-all ${data.view === 'month' ? 'bg-green-400 text-black shadow-[0_0_15px_rgba(57,255,20,0.6)]' : 'bg-transparent text-slate-400'}`;
            document.getElementById('btn-year').className = `px-6 py-2 text-[11px] font-black rounded-lg transition-all ${data.view === 'year' ? 'bg-green-400 text-black shadow-[0_0_15px_rgba(57,255,20,0.6)]' : 'bg-transparent text-slate-400'}`;

            const rituals = data.habits.filter(h => h.start <= selStr);
            const tasks = data.tasks.filter(t => t.date === selStr);
            const total = rituals.length + tasks.length;
            const done = rituals.filter(h => h.done.includes(selStr)).length + tasks.filter(t => t.completed).length;
            if(total > 0) data.history[selStr] = Math.round((done/total)*100);

            let s = 0; let check = new Date();
            while(data.history[toKey(check)] >= 90) { s++; check.setDate(check.getDate()-1); }
            document.getElementById('streakCount').innerText = s;

            const isFuture = selStr > todayStr;

            const listHtml = (list, type) => list.map(item => {
                const gIdx = type === 'rep' ? data.habits.indexOf(item) : data.tasks.indexOf(item);
                const isDone = type === 'rep' ? item.done.includes(selStr) : item.completed;
                return `<li class="flex items-center justify-between p-4 habit-item rounded-2xl group transition-all ${isFuture ? 'future-lock' : ''}">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${isDone ? 'checked' : ''} ${isFuture ? 'disabled' : ''} onclick="toggle('${type}', ${gIdx})" class="w-6 h-6 accent-green-400 cursor-pointer scale-110">
                        <span class="habit-text text-sm ${isDone ? 'line-through opacity-40 text-green-300' : 'text-white'} transition-all">${item.text}</span>
                    </div>
                    <button onclick="removeTask('${type}', ${gIdx})" class="delete-btn opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                </li>`;
            }).join('');
            document.getElementById('repList').innerHTML = listHtml(rituals, 'rep');
            document.getElementById('specList').innerHTML = listHtml(tasks, 'spec');

            renderGrid(y, m, selStr);
        }

        function renderGrid(y, m, selStr) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            const weekdays = ['M','T','W','T','F','S','S'];

            if(data.view === 'year') {
                const row1 = document.createElement('div'); row1.className = "year-row";
                const row2 = document.createElement('div'); row2.className = "year-row";
                const monthsShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                
                monthsShort.forEach((name, i) => {
                    const mDiv = document.createElement('div'); mDiv.className = "mini-month border-white/20";
                    mDiv.innerHTML = `<p class="text-[10px] font-black text-center mb-3 text-green-300 uppercase tracking-widest">${name}</p>`;
                    const grid = document.createElement('div'); grid.className = "calendar-grid";
                    weekdays.forEach(d => grid.innerHTML += `<div class="weekday-label">${d}</div>`);
                    const firstDay = new Date(y, i, 1).getDay() || 7;
                    const daysInMonth = new Date(y, i+1, 0).getDate();
                    for(let e=1; e<firstDay; e++) grid.innerHTML += `<div></div>`;
                    for(let d=1; d<=daysInMonth; d++) {
                        const dStr = `${y}-${String(i+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        grid.appendChild(createBox(dStr, selStr, d, true));
                    }
                    mDiv.appendChild(grid);
                    (i < 6) ? row1.appendChild(mDiv) : row2.appendChild(mDiv);
                });
                container.appendChild(row1); container.appendChild(row2);
            } else {
                const grid = document.createElement('div');
                grid.className = "calendar-grid max-w-[300px] mx-auto scale-110";
                weekdays.forEach(d => grid.innerHTML += `<div class="weekday-label text-[10px] mb-2">${d}</div>`);
                const firstDay = new Date(y, m-1, 1).getDay() || 7;
                const daysInMonth = new Date(y, m, 0).getDate();
                for(let e=1; e<firstDay; e++) grid.innerHTML += `<div></div>`;
                for(let d=1; d<=daysInMonth; d++) {
                    const dStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    grid.appendChild(createBox(dStr, selStr, d, false));
                }
                container.appendChild(grid);
            }
        }

        function createBox(dStr, selStr, dateNum, isYear) {
            const box = document.createElement('div');
            const pct = data.history[dStr] || 0;
            let color = 'c-empty';
            if(pct > 0) color = pct > 80 ? 'c-green' : (pct > 40 ? 'c-yellow' : 'c-red');
            box.className = `day-box ${color} ${dStr === selStr ? 'selected-day' : ''} ${isYear ? 'text-[8px]' : 'text-[10px]'}`;
            box.innerText = dateNum;
            box.onclick = () => { document.getElementById('datePicker').value = dStr; render(); };
            return box;
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('datePicker').value = toKey(now);
            render(); sync('load');
        };
    </script>
</body>
</html>
