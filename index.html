<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Habit Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #0a0c10; --green: #39ff14; --red: #ff3131; --yellow: #fff01f; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Plus Jakarta Sans', sans-serif; }
        .app-container { width: 80vw; max-width: 1300px; margin: 0 auto; padding: 10px 0; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding-bottom: 10px; border-bottom: 1px solid #1f2328; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .mini-month { background: #0a0c10; padding: 6px; border-radius: 8px; border: 1px solid #1f2328; flex: 1; min-width: 110px; }
        .day-box { border-radius: 2px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); font-size: 7px; }
        .c-empty { background: #161b22; color: #484f58; }
        .c-red { background: var(--red); color: #000; }
        .c-yellow { background: var(--yellow); color: #000; }
        .c-green { background: var(--green); color: #000; }
        .selected { outline: 2px solid #fff; outline-offset: 1px; }
        .input-box { font-size: 0.95rem !important; }
        .task-header { font-size: 0.85rem !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sticky-header text-center">
            <h1 class="text-xl md:text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 uppercase italic">Habit Manager</h1>
            <p id="syncStatus" class="text-[9px] text-green-400 mt-1 uppercase font-bold opacity-60">☁️ Initializing...</p>
            <div class="flex justify-between items-center bg-[#0d1117] p-3 rounded-xl border border-[#1f2328] mt-2">
                <div class="text-left">
                    <h2 id="dateLabel" class="text-base font-bold text-white">...</h2>
                    <p class="text-yellow-400 text-[9px] font-bold uppercase mt-1">🔥 Streak: <span id="streakVal">0</span></p>
                </div>
                <input type="date" id="datePicker" onchange="render()" class="bg-black border border-gray-700 p-1 rounded text-xs text-white">
            </div>
        </div>

        <div class="bg-[#0d1117] p-3 rounded-xl border border-[#1f2328] mt-4">
            <div class="flex gap-2 mb-3">
                <button onclick="data.view='month';render()" class="px-3 py-1 text-[9px] font-bold bg-green-400 text-black rounded">MONTH</button>
                <button onclick="data.view='year';render()" class="px-3 py-1 text-[9px] font-bold bg-gray-800 text-white rounded">YEAR</button>
            </div>
            <div id="gridBody"></div>
        </div>

        <div class="grid md:grid-cols-2 gap-4 mt-4">
            <div class="bg-[#0d1117] p-3 rounded-xl border border-[#1f2328]">
                <p class="task-header font-bold text-blue-400 uppercase mb-2">🔄 Daily Rituals</p>
                <div class="flex gap-2 mb-3">
                    <input id="in-rep" type="text" class="input-box flex-1 bg-black border border-blue-900 p-2 rounded-lg text-white" placeholder="Add habit...">
                    <button onclick="add('rep')" class="bg-blue-600 px-4 rounded-lg font-bold text-white">+</button>
                </div>
                <ul id="list-rep" class="space-y-1.5"></ul>
            </div>
            <div class="bg-[#0d1117] p-3 rounded-xl border border-[#1f2328]">
                <p class="task-header font-bold text-purple-400 uppercase mb-2">🎯 Specific Tasks</p>
                <div class="flex gap-2 mb-3">
                    <input id="in-spec" type="text" class="input-box flex-1 bg-black border border-purple-900 p-2 rounded-lg text-white" placeholder="Add task...">
                    <button onclick="add('spec')" class="bg-purple-600 px-4 rounded-lg font-bold text-white">+</button>
                </div>
                <ul id="list-spec" class="space-y-1.5"></ul>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR URL BELOW
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxJvcN0ZrrTVxFvqsTytAabThvdp_U24Vn-WAY7-fND4uWtFqaTxANQ86oaFpp0f4qBug/exec"; 
        
        let data = { habits: [], tasks: [], history: {}, view: 'month' };

        const sync = async (action) => {
            const status = document.getElementById('syncStatus');
            try {
                if (action === 'save') {
                    status.innerText = "☁️ Saving...";
                    await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    setTimeout(() => status.innerText = "✅ Saved to Cloud", 1000);
                } else {
                    status.innerText = "☁️ Loading...";
                    const res = await fetch(SHEET_URL + "?t=" + Date.now());
                    const cloud = await res.json();
                    if (cloud.history) { data = cloud; render(); }
                    status.innerText = "✅ Cloud Synced";
                }
            } catch (e) { status.innerText = "⚠️ Connection Error"; }
        };

        function add(type) {
            const input = document.getElementById('in-' + type);
            if (!input.value) return;
            const date = document.getElementById('datePicker').value;
            if (type === 'rep') data.habits.push({ text: input.value, start: date, done: [] });
            else data.tasks.push({ text: input.value, date: date, completed: false });
            input.value = ''; render(); sync('save');
        }

        function toggle(type, index) {
            const date = document.getElementById('datePicker').value;
            if (type === 'rep') {
                const h = data.habits[index];
                h.done.includes(date) ? h.done = h.done.filter(d => d !== date) : h.done.push(date);
            } else {
                data.tasks[index].completed = !data.tasks[index].completed;
            }
            render(); sync('save');
            if (data.history[date] >= 100) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function render() {
            const curDate = document.getElementById('datePicker').value;
            document.getElementById('dateLabel').innerText = new Date(curDate).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            
            const reps = data.habits.filter(h => h.start <= curDate);
            const specs = data.tasks.filter(t => t.date === curDate);
            const total = reps.length + specs.length;
            const done = reps.filter(h => h.done.includes(curDate)).length + specs.filter(t => t.completed).length;
            if (total > 0) data.history[curDate] = (done / total) * 100;

            document.getElementById('list-rep').innerHTML = reps.map((h, i) => `
                <li class="flex items-center gap-3 p-2 bg-black rounded border border-gray-800">
                    <input type="checkbox" ${h.done.includes(curDate) ? 'checked' : ''} onclick="toggle('rep', ${data.habits.indexOf(h)})" class="w-4 h-4 accent-green-400">
                    <span class="text-sm ${h.done.includes(curDate) ? 'line-through opacity-40' : 'text-white'}">${h.text}</span>
                </li>`).join('');

            document.getElementById('list-spec').innerHTML = specs.map((t, i) => `
                <li class="flex items-center gap-3 p-2 bg-black rounded border border-gray-800">
                    <input type="checkbox" ${t.completed ? 'checked' : ''} onclick="toggle('spec', ${data.tasks.indexOf(t)})" class="w-4 h-4 accent-purple-400">
                    <span class="text-sm ${t.completed ? 'line-through opacity-40' : 'text-white'}">${t.text}</span>
                </li>`).join('');

            let s = 0; let d = new Date();
            while(data.history[d.toISOString().split('T')] >= 90) { s++; d.setDate(d.getDate()-1); }
            document.getElementById('streakVal').innerText = s;
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('gridBody');
            container.innerHTML = '';
            const selDate = document.getElementById('datePicker').value;
            const year = new Date(selDate).getFullYear();

            if (data.view === 'year') {
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const wrap = document.createElement('div'); wrap.className = "grid grid-cols-2 md:grid-cols-6 gap-2";
                months.forEach((m, i) => {
                    const mDiv = document.createElement('div'); mDiv.className = "mini-month";
                    mDiv.innerHTML = `<p class="text-[8px] font-bold text-center mb-1 text-green-400">${m}</p>`;
                    const g = document.createElement('div'); g.className = "calendar-grid";
                    let startDay = new Date(year, i, 1).getDay() || 7;
                    for(let e=1; e<startDay; e++) g.innerHTML += `<div class="day-box"></div>`;
                    for(let d=1; d<=new Date(year, i+1, 0).getDate(); d++) {
                        const dStr = `${year}-${String(i+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const pct = data.history[dStr] || 0;
                        let color = 'c-empty';
                        if(pct > 0) color = pct > 80 ? 'c-green' : (pct > 40 ? 'c-yellow' : 'c-red');
                        g.innerHTML += `<div class="day-box ${color} ${dStr === selDate ? 'selected' : ''}" onclick="document.getElementById('datePicker').value='${dStr}';render()"></div>`;
                    }
                    mDiv.appendChild(g); wrap.appendChild(mDiv);
                });
                container.appendChild(wrap);
            } else {
                const g = document.createElement('div'); g.className = "calendar-grid max-w-xs mx-auto";
                const m = new Date(selDate).getMonth();
                for(let d=1; d<=new Date(year, m+1, 0).getDate(); d++) {
                    const dStr = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const pct = data.history[dStr] || 0;
                    let color = 'c-empty';
                    if(pct > 0) color = pct > 80 ? 'c-green' : (pct > 40 ? 'c-yellow' : 'c-red');
                    g.innerHTML += `<div class="day-box ${color} h-7 text-[9px] ${dStr === selDate ? 'selected' : ''}" onclick="document.getElementById('datePicker').value='${dStr}';render()">${d}</div>`;
                }
                container.appendChild(g);
            }
        }

        window.onload = () => {
            document.getElementById('datePicker').value = new Date().toISOString().split('T');
            render();
            sync('load');
        };
    </script>
</body>
</html>
