<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Habit Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --green: #39ff14; --red: #ff3131; --yellow: #fff01f; --border: #1f2328; }
        body { background-color: var(--bg); color: #e6edf3; font-family: 'Plus Jakarta Sans', sans-serif; }
        .app-container { width: 85vw; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-box { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; cursor: pointer; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s ease; font-size: 10px;
        }
        .c-empty { background: #161b22; color: #484f58; }
        .c-red { background: var(--red); color: #000; }
        .c-yellow { background: var(--yellow); color: #000; }
        .c-green { background: var(--green); color: #000; }
        .selected-day { outline: 2px solid #fff; outline-offset: 2px; box-shadow: 0 0 15px #fff; z-index: 20; }
        .weekday-label { font-size: 10px; font-weight: 900; color: #8b949e; text-align: center; padding-bottom: 5px; }
        .mini-month { background: #0d1117; padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body class="p-4">

    <div class="app-container space-y-6">
        <div class="sticky-header text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase italic tracking-tighter">Habit Manager</h1>
            <div id="syncStatus" class="text-[10px] font-black text-green-400 mt-1 opacity-50 uppercase tracking-[0.2em]">☁️ Connecting...</div>
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-[#0d1117] p-5 rounded-2xl border border-gray-800 mt-4 shadow-2xl">
                <div class="text-left">
                    <h2 id="displayDate" class="text-xl font-bold text-white leading-none">...</h2>
                    <p class="text-yellow-400 font-black text-[10px] uppercase mt-2 tracking-widest">🔥 Streak: <span id="streakCount">0</span> Days</p>
                </div>
                <input type="date" id="datePicker" onchange="render()" class="bg-black border border-gray-700 p-2.5 rounded-xl text-sm font-bold text-white outline-none">
            </div>
        </div>

        <div class="bg-[#0d1117] p-6 rounded-2xl border border-gray-800">
            <div class="flex justify-between items-center mb-6">
                <div class="flex bg-black p-1 rounded-xl border border-gray-800">
                    <button onclick="setView('month')" id="btn-month" class="px-6 py-2 text-xs font-black rounded-lg transition-all">MONTH</button>
                    <button onclick="setView('year')" id="btn-year" class="px-6 py-2 text-xs font-black rounded-lg transition-all">YEAR</button>
                </div>
                <h2 id="viewLabel" class="text-xs font-black uppercase text-gray-500 tracking-[0.3em]"></h2>
            </div>
            <div id="gridContainer"></div>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">
            <div class="bg-[#0d1117] rounded-3xl border border-gray-800 p-6">
                <p class="text-[10px] font-black text-blue-400 uppercase mb-4 tracking-[0.2em]">🔄 Daily Rituals</p>
                <div class="flex gap-2 mb-4">
                    <input id="repIn" type="text" class="flex-1 bg-black border border-blue-900/50 p-4 rounded-2xl text-sm text-white outline-none" placeholder="Habit...">
                    <button onclick="addHabit('rep')" class="bg-blue-600 text-white px-6 rounded-2xl font-black">+</button>
                </div>
                <ul id="repList" class="space-y-3"></ul>
            </div>
            <div class="bg-[#0d1117] rounded-3xl border border-gray-800 p-6">
                <p class="text-[10px] font-black text-purple-400 uppercase mb-4 tracking-[0.2em]">🎯 Specific Tasks</p>
                <div class="flex gap-2 mb-4">
                    <input id="specIn" type="text" class="flex-1 bg-black border border-purple-900/50 p-4 rounded-2xl text-sm text-white outline-none" placeholder="Task...">
                    <button onclick="addHabit('spec')" class="bg-purple-600 text-white px-6 rounded-2xl font-black">+</button>
                </div>
                <ul id="specList" class="space-y-3"></ul>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxJvcN0ZrrTVxFvqsTytAabThvdp_U24Vn-WAY7-fND4uWtFqaTxANQ86oaFpp0f4qBug/exec";
        let data = { habits: [], tasks: [], history: {}, view: 'month' };

        // HELPER: Convert Date to YYYY-MM-DD
        const toKey = (d) => {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        };

        async function sync(type) {
            const status = document.getElementById('syncStatus');
            try {
                if(type === 'save') {
                    status.innerText = "☁️ SAVING...";
                    await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    setTimeout(() => status.innerText = "✅ SAVED TO DRIVE", 800);
                } else {
                    status.innerText = "☁️ LOADING...";
                    const res = await fetch(SHEET_URL + "?t=" + Date.now());
                    const cloud = await res.json();
                    if(cloud && cloud.history) data = cloud;
                    status.innerText = "✅ CLOUD SYNCED";
                    render();
                }
            } catch(e) { status.innerText = "⚠️ LOCAL MODE"; render(); }
        }

        function setView(v) { data.view = v; render(); }

        function addHabit(type) {
            const input = document.getElementById(type === 'rep' ? 'repIn' : 'specIn');
            if(!input.value.trim()) return;
            const date = document.getElementById('datePicker').value;
            if(type === 'rep') data.habits.push({ text: input.value, start: date, done: [] });
            else data.tasks.push({ text: input.value, date: date, completed: false });
            input.value = ''; render(); sync('save');
        }

        function toggle(type, index) {
            const date = document.getElementById('datePicker').value;
            if(type === 'rep') {
                const h = data.habits[index];
                h.done.includes(date) ? h.done = h.done.filter(d => d !== date) : h.done.push(date);
            } else {
                data.tasks[index].completed = !data.tasks[index].completed;
            }
            render(); sync('save');
            if(data.history[date] >= 100) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function render() {
            const selStr = document.getElementById('datePicker').value;
            const [y, m, d] = selStr.split('-').map(Number);
            const dateObj = new Date(y, m-1, d);
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

            // FIX: TOP DATE DISPLAY
            document.getElementById('displayDate').innerText = `${days[dateObj.getDay()]}, ${monthNames[dateObj.getMonth()]} ${d}`;
            document.getElementById('viewLabel').innerText = data.view === 'year' ? y : `${monthNames[m-1]} ${y}`;

            // VIEW BUTTONS
            document.getElementById('btn-month').className = `px-6 py-2 text-xs font-black rounded-lg transition-all ${data.view === 'month' ? 'bg-green-400 text-black shadow-[0_0_15px_#39ff14]' : 'bg-transparent text-gray-500'}`;
            document.getElementById('btn-year').className = `px-6 py-2 text-xs font-black rounded-lg transition-all ${data.view === 'year' ? 'bg-green-400 text-black shadow-[0_0_15px_#39ff14]' : 'bg-transparent text-gray-500'}`;

            // PROGRESS CALC
            const rituals = data.habits.filter(h => h.start <= selStr);
            const tasks = data.tasks.filter(t => t.date === selStr);
            const total = rituals.length + tasks.length;
            const done = rituals.filter(h => h.done.includes(selStr)).length + tasks.filter(t => t.completed).length;
            if(total > 0) data.history[selStr] = Math.round((done/total)*100);

            // STREAK
            let s = 0; let check = new Date();
            while(data.history[toKey(check)] >= 90) { s++; check.setDate(check.getDate()-1); }
            document.getElementById('streakCount').innerText = s;

            // LISTS
            const listHtml = (list, type) => list.map(item => {
                const gIdx = type === 'rep' ? data.habits.indexOf(item) : data.tasks.indexOf(item);
                const isDone = type === 'rep' ? item.done.includes(selStr) : item.completed;
                return `<li class="flex items-center gap-4 p-4 bg-black rounded-2xl border border-gray-800">
                    <input type="checkbox" ${isDone ? 'checked' : ''} onclick="toggle('${type}', ${gIdx})" class="w-6 h-6 accent-green-400">
                    <span class="text-sm font-bold ${isDone ? 'line-through opacity-30' : 'text-white'}">${item.text}</span>
                </li>`;
            }).join('');
            document.getElementById('repList').innerHTML = listHtml(rituals, 'rep');
            document.getElementById('specList').innerHTML = listHtml(tasks, 'spec');

            renderGrid(y, m, selStr);
        }

        function renderGrid(year, month, selStr) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            const weekdays = ['M','T','W','T','F','S','S'];

            if(data.view === 'year') {
                const wrap = document.createElement('div');
                wrap.className = "grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4";
                const monthsShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                
                monthsShort.forEach((name, i) => {
                    const mDiv = document.createElement('div');
                    mDiv.className = "mini-month";
                    mDiv.innerHTML = `<p class="text-[10px] font-black text-center mb-3 text-green-400 uppercase tracking-widest">${name}</p>`;
                    const grid = document.createElement('div'); grid.className = "calendar-grid";
                    weekdays.forEach(d => grid.innerHTML += `<div class="weekday-label">${d}</div>`);
                    
                    const firstDay = new Date(year, i, 1).getDay() || 7; // Monday start fix
                    const daysInMonth = new Date(year, i+1, 0).getDate();
                    
                    for(let e=1; e<firstDay; e++) grid.innerHTML += `<div></div>`;
                    for(let d=1; d<=daysInMonth; d++) {
                        const dStr = `${year}-${String(i+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        grid.appendChild(createBox(dStr, selStr, d));
                    }
                    mDiv.appendChild(grid); wrap.appendChild(mDiv);
                });
                container.appendChild(wrap);
            } else {
                const grid = document.createElement('div');
                grid.className = "calendar-grid max-w-lg mx-auto";
                weekdays.forEach(d => grid.innerHTML += `<div class="weekday-label text-sm mb-2">${d}</div>`);
                
                const firstDay = new Date(year, month-1, 1).getDay() || 7;
                const daysInMonth = new Date(year, month, 0).getDate();
                
                for(let e=1; e<firstDay; e++) grid.innerHTML += `<div></div>`;
                for(let d=1; d<=daysInMonth; d++) {
                    const dStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    grid.appendChild(createBox(dStr, selStr, d));
                }
                container.appendChild(grid);
            }
        }

        function createBox(dStr, selStr, dateNum) {
            const box = document.createElement('div');
            const pct = data.history[dStr] || 0;
            let color = 'c-empty';
            if(pct > 0) color = pct > 80 ? 'c-green' : (pct > 40 ? 'c-yellow' : 'c-red');
            
            box.className = `day-box ${color} ${dStr === selStr ? 'selected-day' : ''}`;
            box.innerText = dateNum;
            box.onclick = () => {
                document.getElementById('datePicker').value = dStr;
                render();
            };
            return box;
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('datePicker').value = toKey(now);
            render(); // RENDER ONCE IMMEDIATELY
            sync('load');
        };
    </script>
</body>
</html>
